services:
  database:
    image: postgres:16-alpine
    container_name: craftai-database
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: America/Sao_Paulo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: src/api/Dockerfile.api
    container_name: craftai-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: America/Sao_Paulo
      POSTGRES_HOST: database
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./logs:/app/logs
      - ./cache:/app/cache
    command: ["uv", "run", "uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--log-level", "warning"]

  web:
    build:
      context: ./src/web
      dockerfile: Dockerfile.web
    container_name: craftai-web
    restart: unless-stopped
    environment:
      TZ: America/Sao_Paulo
      VITE_API_URL: http://localhost:8000/api/v1
    depends_on:
      - api
    ports:
      - "5173:5173"
    volumes:
      - ./src/web:/app
      - /app/node_modules
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]

volumes:
  postgres_data:
