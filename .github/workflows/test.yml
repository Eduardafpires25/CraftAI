name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.12']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"
    
    - name: Create virtual environment
      run: |
        uv venv
    
    - name: Install dependencies
      run: |
        source .venv/bin/activate
        uv pip install -e .[test]
    
    - name: Set up environment variables
      run: |
        echo "LOG_LEVEL=DEBUG" >> $GITHUB_ENV
        echo "DEV_MODE=true" >> $GITHUB_ENV
        echo "POSTGRES_USER=test" >> $GITHUB_ENV
        echo "POSTGRES_PASSWORD=test" >> $GITHUB_ENV
        echo "POSTGRES_DB=test" >> $GITHUB_ENV
        echo "POSTGRES_HOST=localhost" >> $GITHUB_ENV
        echo "AI_PLACEHOLDER_MODE=true" >> $GITHUB_ENV
    
    - name: Run tests with coverage
      run: |
        source .venv/bin/activate
        pytest --cov=src --cov-report=xml --cov-report=html --cov-fail-under=80
