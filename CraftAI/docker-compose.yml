services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: craftai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - craftai-network

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/craftai
      SECRET_KEY: your-secret-key-change-this-in-production
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
    networks:
      - craftai-network

  frontend:
    build: ./frontend
    ports:
      - "3001:3000"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - craftai-network

volumes:
  postgres_data:

networks:
  craftai-network:
    driver: bridge
